<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>IDA TV | Панель Управления</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #222; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0,212,255,0.1); }
        h2 { color: #00d4ff; text-align: center; text-transform: uppercase; margin-top: 0; }
        .f-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #00d4ff; }
        .btn { width: 100%; background: #00d4ff; color: #000; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #fff; }
        #status { text-align: center; margin-top: 15px; font-size: 13px; }
        .back { display: block; text-align: center; margin-top: 20px; color: #444; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
<div class="admin-card">
    <h2>Добавить клиента</h2>
    <div class="f-group"><label>ID для ссылки (ivan77)</label><input type="text" id="id"></div>
    <div class="f-group"><label>Имя клиента</label><input type="text" id="nick"></div>
    <div class="f-group"><label>Дата окончания</label><input type="text" id="date" placeholder="31.12.2026"></div>
    <div class="f-group"><label>Плейлист M3U</label><input type="text" id="m3u"></div>
    <div class="f-group"><label>Программа EPG</label><input type="text" id="epg"></div>
    <button class="btn" onclick="save()">СОХРАНИТЬ В БАЗУ</button>
    <div id="status"></div>
    <a href="index.html" class="back">← Вернуться в плеер</a>
</div>
<script>
    const DB = "https://player1-71b92-default-rtdb.firebaseio.com";
    async function save() {
        const id = document.getElementById('id').value.trim();
        const msg = document.getElementById('status');
        if(!id) return alert("Введите ID!");
        const data = {
            nickname: document.getElementById('nick').value,
            expireDate: document.getElementById('date').value,
            m3u: document.getElementById('m3u').value,
            epg: document.getElementById('epg').value
        };
        msg.innerText = "Сохранение...";
        try {
            const res = await fetch(`${DB}/clients/${id}.json`, { method: 'PUT', body: JSON.stringify(data) });
            if(res.ok) {
                msg.innerHTML = "<b style='color:#00ff00'>Успешно активирован!</b>";
                document.querySelectorAll('input').forEach(i => i.value="");
            }
        } catch(e) { msg.innerText = "Ошибка сети"; }
    }
</script>
</body>
</html>
